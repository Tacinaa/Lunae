services:
  postgres:
    image: postgres:16-alpine
    container_name: lunae-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lunae
    ports:
      - "5433:5432"
    volumes:
      - lunae_pgdata:/var/lib/postgresql/data

volumes:
  lunae_pgdata:
